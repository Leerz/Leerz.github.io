<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Selector and Exporter</title>
    <style>
/* General Body Setup */
body {
    font-family: Arial, sans-serif;
    display: flex;
    background-color: #f3f4f6;
    margin: 0;
    margin-top: 90px; /* Adjust depending on the height of the search container */
    padding: 0;
    box-sizing: border-box;
}

/* Pane for Left and Right sections */
.pane {
    width: 50%;
    padding: 20px;
    border: 1px solid #ddd;
    box-sizing: border-box;
    overflow-y: auto;
    height: 90vh;
    background-color: #fff;
    border-radius: 8px;
    box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
}

.pane.left {
    margin-right: 10px;
}

.pane.right {
    margin-left: 10px;
}

/* Item Styling */
.item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px;
    margin-bottom: 10px;
    border-bottom: 1px solid #ddd;
    cursor: pointer;
    border-radius: 5px;
    transition: background-color 0.3s ease, transform 0.2s ease;
}

.item:hover {
    background-color: #f0f0f0;
}

.item.selected {
    background-color: #0f1d2b;
    color: white;
    transform: scale(1.05);
}

.item.selected:hover {
    background-color: #0070f3;
}

.item.highlight {
    background-color: #ffd966;
}

/* Controls Section */
.controls {
    margin-bottom: 20px;
    justify-content: space-between;
}

.button-group button {
    background-color: #0070f3;
    color: white;
    padding: 6px 10px; /* Smaller padding for smaller buttons */
    border: none;
    border-radius: 5px;
    font-size: 0.8rem; /* Smaller font size for compact design */
    cursor: pointer;
    transition: background-color 0.3s ease;
}

.button-group button:hover {
    background-color: #005bb5;
}

.button-group button:disabled {
    background-color: #d3d3d3;
    cursor: not-allowed;
}

/* Input box for customer name and search */
input[type="text"] {
    padding: 5px;
    font-size: 1rem;
    width: 100%;
    border: 1px solid #ddd;
    border-radius: 2px;
    margin-bottom: 20px;
}

input[type="text"]:focus {
    border-color: #0070f3;
    outline: none;
}

/* Selected item wrapping off */
#selectedItems .item {
    white-space: nowrap;
}

/* Info Section */
#info {
    margin-top: 20px;
    padding: 15px;
    background-color: #f9f9f9;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

#info h3 {
    font-size: 1.2rem;
    font-weight: bold;
    margin: 0;
}

/* File List Section under selected folder */
.fileListContainer {
    margin-top: 20px;
    padding: 10px;
    background-color: #f9f9f9;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

/* exportClient */
#exportClient {
    background-color: #f57c00;
    padding: 12px 20px;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 1rem;
    transition: background-color 0.3s ease;
}

/* Reload Button */
#reloadButton {
    background-color: #f57c00;
    padding: 12px 20px;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 1rem;
    transition: background-color 0.3s ease;
}

#reloadButton:hover {
    background-color: #e65100;
}

/* Floating Search Container */
.search-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 49%;
    padding: 5px;
    background-color: white;
    z-index: 1000; /* Ensures it's above other content */
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2); /* Optional: adds shadow for better visibility */
}

/* Controls Section Floating */
.controls {
    position: fixed;
    top: 0px;
    left: 50%;
    width: 50%;
    padding: 10px;
    background-color: white;
    z-index: 1000; /* Ensures it's above other content */
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2); /* Optional: adds shadow for better visibility */
}

/* Info Section Floating */
.infoz {
    position: fixed;
    top: 150px;
    left: 50%;
    width: 50%;
    padding: 10px;
    background-color: white;
    z-index: 1000; /* Ensures it's above other content */
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2); /* Optional: adds shadow for better visibility */
}

/* Selected Items Section */
.selecteds {
    margin-top: 220px;
    left: 50%;
    width: 80%;
    padding: 10px;
    background-color: white;
    z-index: 1000; /* Ensures it's above other content */
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2); /* Optional: adds shadow for better visibility */
}

/* Media Queries for Mobile Responsiveness */
@media (max-width: 768px) {
    body {
        flex-direction: column;
        margin-top: 150px; /* Adjust based on header sizes */
    }

    /* Adjust the left and right panes for mobile */
    .pane {
        width: 100%;
        margin: 10px 0;
    }

    /* Adjust Search Bar for Mobile */
    .search-container {
        width: 100%;
        padding: 10px;
    }

    /* Adjust Controls for Mobile */
    .controls {
        width: 100%;
        left: 0;
        top: 50px; /* Adjust to avoid overlap with search */
        padding: 10px;
    }

    /* Adjust Info Section for Mobile */
    .infoz {
        width: 100%;
        left: 0;
        top: 100px; /* Adjust based on previous sections */
    }

    /* Adjust Selected Items Section for Mobile */
    .selecteds {
        width: 100%;
        left: 0;
        margin-top: 200px; /* Adjust if needed */
    }

    /* Adjust button sizes for mobile */
    .button-group button {
        width: 100%;
        padding: 8px 12px;
        font-size: 1rem;
    }
}

/* Further customizations for smaller devices can be added here (e.g., @media for 480px or less) */

    </style>
</head>
<body>
    <div class="pane" id="leftPane">
        <div class="controls">
            <strong>Available Items</strong>
            <!--  <input type="text" id="searchBar" placeholder="Search items..." oninput="filterItems()"> -->
        </div>
		<div class="search-container" id="searchContainer">
			<button id="clearSearchBtn" onclick="clearSearch()">Clear</button>
			<input type="text" id="searchBar" placeholder="Search items..." oninput="filterItems()">
		</div>
        <!-- Items will be populated here -->
    </div>



    <div class="pane" id="rightPane">
    <div id="info" class="infoz">
        <p>Total games selected: <span id="totalGames">0</span></p>
        <p>Total size of selected items: <span id="totalSize">0</span> GB</p>
        <p>Approximate install duration: <span id="installDuration">0</span> mins</p>
    </div>
	
        <div class="controls">
            <strong>Selected Items</strong>
            <button onclick="sortBy('name')">Sort by Name</button>
            <button onclick="sortBy('size')">Sort by Size</button>
            <button onclick="clearSelection()">Clear All</button>
            <button onclick="resetSorting()">Reset Sorting</button>
            <br><br>
            <input type="text" id="customerName" placeholder="Enter customer name (required)" required />
            <!--<button onclick="exportForAdmin()" id="exportAdmin">Export for Admin</button>-->
            <button onclick="exportForClient()" id="exportClient">Export LIST</button>
			<button onclick="reloadPage()" id="reloadButton">Reload Page</button>
            <br><br>
        </div>
        <div id="selectedItems" class="selecteds"></div>
    </div>



    <script>
        const leftPane = document.getElementById("leftPane");
        const rightPane = document.getElementById("selectedItems");
        const infoTotalGames = document.getElementById("totalGames");
        const infoTotalSize = document.getElementById("totalSize");
        const infoInstallDuration = document.getElementById("installDuration");
        const customerNameInput = document.getElementById("customerName");

        let selectedItems = [];
        let originalOrder = [];
        let lastMovedIndex = null;

        function convertSizeToBytes(size) {
            const sizeRegex = /(\d+\.?\d*)\s*(GiB|MiB|KiB|B)/i;
            const match = size.match(sizeRegex);
            if (match) {
                const value = parseFloat(match[1]);
                const unit = match[2].toUpperCase();

                switch (unit) {
                    case 'B':
                        return value;
                    case 'KIB':
                        return value * 1024 ;
                    case 'MIB':
                        return value * 1024 * 1024 ;
                    case 'GIB':
                        return value * 1024 * 1024 * 1024 ;
                }
            }
            return 0;
        }

        // Fetch and parse XML file
        fetch('file_tree_output.xml')
            .then(response => response.text())
            .then(data => {
                const parser = new DOMParser();
                const xml = parser.parseFromString(data, 'application/xml');
                const folders = xml.querySelectorAll('folder');

                folders.forEach(folder => {
                    if (folder.getAttribute('name') === 'NSP 2021') return;

                    const name = folder.getAttribute('name');
                    const size = folder.getAttribute('size');
                    const div = document.createElement('div');
                    div.className = 'item';
                    div.dataset.name = name;
                    div.dataset.size = size;
                    div.innerHTML = `${name} <span>${size}</span>`;
                    leftPane.appendChild(div);
                });
            })
            .catch(error => console.error('Error loading XML file:', error));

        leftPane.addEventListener("click", (e) => {
            const item = e.target.closest(".item");
            if (!item) return;

            item.classList.toggle("selected");
            const itemName = item.getAttribute("data-name");
            const itemSize = item.getAttribute("data-size");

            if (item.classList.contains("selected")) {
                selectedItems.push({ name: itemName, size: itemSize });
                originalOrder.push({ name: itemName, size: itemSize });
            } else {
                selectedItems = selectedItems.filter(i => i.name !== itemName);
                originalOrder = originalOrder.filter(i => i.name !== itemName);
            }
            updateRightPane();
        });

        function updateRightPane() {
            rightPane.innerHTML = "";
            selectedItems.forEach((item, index) => {
                const div = document.createElement("div");
                div.className = "item";
                if (index === lastMovedIndex) {
                    div.classList.add("highlight");
                }
                div.dataset.index = index;
div.innerHTML = `

						<div class="button-group">
                        <button onclick="moveUp(${index})">Up</button>
                        <button onclick="moveDown(${index})">Down</button>
						
						
			     <span><span><b>${item.size}</b><button onclick="removeItem(${index})">X</button></span><br>${item.name}</span> </div>

                `;
                rightPane.appendChild(div);
            });
            updateInfo();
        }

        function updateInfo() {
            infoTotalGames.textContent = selectedItems.length;

            const totalSize = selectedItems.reduce((sum, item) => sum + convertSizeToBytes(item.size), 0);
            const totalSizeGB = (totalSize / (1024 ** 3)).toFixed(2);
            infoTotalSize.textContent = totalSizeGB;

const totalInstallDuration = selectedItems.reduce((acc, item) => acc + (convertSizeToBytes(item.size) / (13 * 1e6)), 0);
infoInstallDuration.textContent = (totalInstallDuration / 60).toFixed(2);

        }


        function exportForClient() {
            if (selectedItems.length === 0) return;

            const customerName = customerNameInput.value.trim();
            if (!customerName) {
                alert("Customer name is required!");
                return;
            }

            const fileName = `${customerName}_${new Date().toISOString().slice(0, 19).replace(/[-T]/g, "").replace(/:/g, "")}.PRMZ`;
            const selectedFiles = selectedItems.map(item => item.name);

            const blob = new Blob([selectedFiles.join("\n")], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = fileName;
            link.click();
        }
        function sortBy(field) {
            selectedItems.sort((a, b) => a[field].localeCompare(b[field]));
            updateRightPane();
        }

        function resetSorting() {
            selectedItems = [...originalOrder];
            updateRightPane();
        }

        function clearSelection() {
            selectedItems = [];
            originalOrder = [];
            document.querySelectorAll(".item").forEach(item => item.classList.remove("selected"));
            updateRightPane();
        }

        function reloadPage() {
    const searchBar = document.getElementById("searchBar");
    const customerName = document.getElementById("customerName");
	
	
    searchBar.value = "";  // Clear the search field
    customerName.value = "";  // Clear the search field
	filterItems();
            location.reload();
        }

function filterItems() {
    const query = document.getElementById("searchBar").value.toLowerCase();
    document.querySelectorAll("#leftPane .item").forEach(item => {
        // Check if the item's name matches the query
        const itemName = item.dataset.name.toLowerCase();
        
        // If the item matches the query, show it; otherwise, hide it
        if (itemName.includes(query)) {
            item.style.display = "flex"; // Assuming you're using flexbox or a similar layout for items
        } else {
            item.style.display = "none"; // Hide the item without disturbing the layout
        }
    });
}


        function moveUp(index) {
            if (index === 0) return;
            [selectedItems[index - 1], selectedItems[index]] = [selectedItems[index], selectedItems[index - 1]];
			lastMovedIndex = index - 1;
            updateRightPane();
        }

        function moveDown(index) {
            if (index === selectedItems.length - 1) return;
            [selectedItems[index + 1], selectedItems[index]] = [selectedItems[index], selectedItems[index + 1]];
            lastMovedIndex = index + 1;
            updateRightPane();
        }

        function removeItem(index) {
            const item = selectedItems[index];
            selectedItems.splice(index, 1);
            originalOrder = originalOrder.filter(i => i.name !== item.name);

            // Uncheck the item in the left pane
            const leftItem = Array.from(leftPane.getElementsByClassName("item"))
                .find(i => i.dataset.name === item.name);
            if (leftItem) leftItem.classList.remove("selected");

            lastMovedIndex = null;
            updateRightPane();
        }
		
// Function to clear the search input
function clearSearch() {
    const searchBar = document.getElementById("searchBar");
    searchBar.value = "";  // Clear the search field
	filterItems();
}

document.onkeydown = function(e) {
    if (e.keyCode === 123) {  // F12 key
        e.preventDefault();
        alert("Developer tools are disabled.");
    }
};
document.addEventListener("contextmenu", function(event) {
    event.preventDefault();
});

        const searchBar = document.getElementById("searchBar");
        const customerName = document.getElementById("customerName");

        searchBar.focus();

        document.addEventListener("click", (event) => {
            // Check if the clicked element is not the customer name input
            if (event.target !== customerName && event.target !== searchBar) {
                // Refocus the search bar
                searchBar.focus();
				searchBar.select();
            }
        });

        customerName.addEventListener("focus", () => {
            // Allow customerName to keep focus if clicked
            customerName.addEventListener("blur", () => {
                // Refocus the search bar when leaving the customerName field
                searchBar.focus();
				searchBar.select();
            }, { once: true });
        });


    </script>
</body>
</html>
