<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Selector and Exporter</title>
    <style>
        /* General Body Setup */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            background-color: #f3f4f6;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
			
			
        }

        /* Pane for Left and Right sections */
        .pane {
            width: 50%;
            padding: 20px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            overflow-y: auto;
            height: 90vh;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
        }

        .pane.left {
            margin-right: 10px;
        }

        .pane.right {
            margin-left: 10px;
        }

        /* Item Styling */
        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin-bottom: 10px;
            border-bottom: 1px solid #ddd;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .item:hover {
            background-color: #f0f0f0;
        }

        .item.selected {
            background-color: #0f1d2b;
            color: white;
            transform: scale(1.05);
        }

        .item.selected:hover {
            background-color: #0070f3;
        }

        .item.highlight {
            background-color: #ffd966;
        }

        /* Controls Section */
        .controls {
            margin-bottom: 20px;
            justify-content: space-between;
        }

        .button-group button {
            background-color: #0070f3;
            color: white;
            padding: 6px 10px; /* Smaller padding for smaller buttons */
            border: none;
            border-radius: 5px;
            font-size: 0.8rem; /* Smaller font size for compact design */
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .button-group button:hover {
            background-color: #005bb5;
        }

        .button-group button:disabled {
            background-color: #d3d3d3;
            cursor: not-allowed;
        }

        /* Input box for customer name and search */
        input[type="text"] {
            padding: 10px;
            font-size: 1rem;
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        input[type="text"]:focus {
            border-color: #0070f3;
            outline: none;

        }

        /* Selected item wrapping off */
        #selectedItems .item {
            white-space: nowrap;
        }

        /* Info Section */
        #info {
            margin-top: 20px;
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        #info h3 {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 0;
        }

        /* File List Section under selected folder */
        .fileListContainer {
            margin-top: 20px;
            padding: 10px;
            background-color: #f9f9f9;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        /* Reload Button */
        #reloadButton {
            background-color: #f57c00;
            padding: 12px 20px;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.3s ease;
        }

        #reloadButton:hover {
            background-color: #e65100;
        }

		
    </style>
</head>
<body>
    <div class="pane" id="leftPane">
        <div class="controls">
            <strong>Available Items</strong>
            <!--  <input type="text" id="searchBar" placeholder="Search items..." oninput="filterItems()"> -->
        </div>
<div class="search-container" id="searchContainer">
    <button id="clearSearchBtn" onclick="clearSearch()">Clear</button>
	<input type="text" id="searchBar" placeholder="Search items..." oninput="filterItems()">
</div>
        <!-- Items will be populated here -->
    </div>
    <div class="pane" id="rightPane">
        <div class="controls">
            <strong>Selected Items</strong>
            <button onclick="sortBy('name')">Sort by Name</button>
            <button onclick="sortBy('size')">Sort by Size</button>
            <button onclick="clearSelection()">Clear All</button>
            <button onclick="resetSorting()">Reset Sorting</button>
            <br><br>
            <input type="text" id="customerName" placeholder="Enter customer name (required)" required />
            <button onclick="reloadPage()" id="reloadButton">Reload Page</button>
            <br><br>

            <button onclick="exportForClient()" id="exportClient">Export LIST</button>
        </div>
        <div id="selectedItems"></div>
    </div>

    <div id="info">
        <p>Total games selected: <span id="totalGames">0</span></p>
        <p>Total size of selected items: <span id="totalSize">0</span> GB</p>
        <p>Approximate install duration: <span id="installDuration">0</span> seconds</p>
    </div>
