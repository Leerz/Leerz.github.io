<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modular Page with Dynamic TOC</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f2f2f2;
            color: #333;
            margin: 0;
            padding: 0;
        }
        #toc {
            width: 250px;
            float: left;
            margin-right: 20px;
            background-color: #e60012;
            padding: 10px;
            border-radius: 5px;
        }
        #toc h2 {
            color: #fff;
            font-size: 1.5em;
            margin: 0;
            padding-bottom: 10px;
        }
        #toc ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
            font-size: 20px;
            color: #0066ff;
        }
        #toc li {
            margin: 5px 0;
        }
        #toc .toc-item span {
            display: block;
            padding: 8px 10px;
            color: #fff;
            cursor: pointer;
            border-radius: 3px;
            transition: background-color 0.3s, padding-left 0.3s;
        }
        #toc .toc-item span:hover {
            background-color: #f6f6f6;
            color: #e60012;
        }
        #toc .toc-item ul {
            padding-left: 20px;
            font-size: 13px;
        }
        #content {
            margin-left: 270px;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        #content h1 {
            color: #e60012;
            margin-top: 0;
        }
        #content p {
            line-height: 1.6;
        }

        /* Mobile-friendly styles */
        @media (max-width: 768px) {
            #toc {
                width: 100%;
                float: none;
                margin-right: 0;
                margin-bottom: 20px;
            }
            #content {
                margin-left: 0;
            }
            #toc h2 {
                text-align: center;
            }
            #toc ul {
                text-align: center;
            }
            #toc .toc-item span {
                padding: 10px 5px;
                font-size: 18px;
            }
        }

        @media (max-width: 480px) {
            #toc {
                padding: 5px;
            }
            #toc h2 {
                font-size: 1.2em;
            }
            #content {
                padding: 10px;
            }
            #content h1, #content p {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div id="toc">
        <h2>Table of Contents</h2>
        <div id="toc-content"></div>
    </div>

    <div id="content">
        <h2>Premazing Day! Welcome to PremazingPH</h2>
